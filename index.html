<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>eTech Mobility — Ops</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2e2e2e;--border2:#3a3a3a;--text:#f0f0f0;--muted:#888;--accent:#4ade80;--accent-dim:#1a3d28;--red:#f87171;--radius:10px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 20px}
.wrap{width:100%;max-width:400px}
.brand{text-align:center;margin-bottom:40px}
.brand-label{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.brand-name{font-size:24px;font-weight:600;letter-spacing:-.02em}
.brand-sub{font-size:13px;color:var(--muted);margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
label{display:block;font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:15px;padding:12px 14px;outline:none;transition:border-color .15s;-webkit-appearance:none;margin-bottom:16px}
input:focus{border-color:var(--accent)}
.btn{width:100%;background:var(--accent);color:#0a1f12;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:opacity .15s;margin-top:4px}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.4;cursor:not-allowed}
.error{background:#2a1515;border:1px solid #4a2020;border-radius:8px;padding:12px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-label">eTech Mobility</div>
    <div class="brand-name">Ops Portal</div>
    <div class="brand-sub">Repair management</div>
  </div>
  <div class="card">
    <div id="error" class="error"></div>
    <label>Email</label>
    <input type="email" id="email" placeholder="you@etechmobility.co.uk" autocomplete="email">
    <label>Password</label>
    <input type="password" id="password" autocomplete="current-password">
    <button class="btn" id="loginBtn" onclick="login()">Sign in</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://xndqyqdqturqqnltvqvd.supabase.co'
const SUPABASE_KEY = 'sb_publishable_JFdevwgCqf3plTIcmxGJ_A_h6sLuodl'
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

;(async () => {
  const { data: { session } } = await sb.auth.getSession()
  if (session) window.location.href = 'app.html'
})()

async function login() {
  const btn = document.getElementById('loginBtn')
  const errEl = document.getElementById('error')
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  errEl.style.display = 'none'
  if (!email || !password) { showErr('Enter your email and password.'); return }
  btn.disabled = true; btn.textContent = 'Signing in…'
  const { error } = await sb.auth.signInWithPassword({ email, password })
  if (error) { showErr(error.message); btn.disabled = false; btn.textContent = 'Sign in' }
  else window.location.href = 'app.html'
}

function showErr(msg) {
  const el = document.getElementById('error')
  el.textContent = msg; el.style.display = 'block'
}

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login() })
</script>
</body>
</html>
