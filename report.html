<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repair Report — eTech Mobility</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#29ABE2;
  --blue-light:#e8f6fc;
  --blue-mid:#b3e2f7;
  --dark:#1a1a1a;
  --grey:#404040;
  --muted:#777;
  --border:#e4e4e4;
  --bg:#f5f6f8;
  --white:#ffffff;
  --green:#16a34a;
  --green-bg:#dcfce7;
  --amber:#d97706;
  --amber-bg:#fef3c7;
  --red:#dc2626;
  --red-bg:#fee2e2;
  --purple:#7c3aed;
  --purple-bg:#ede9fe;
  --radius:10px;
  --sans:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--dark);min-height:100vh;font-size:15px}

/* Header */
.header{background:var(--white);border-bottom:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{height:48px;width:auto;display:block;max-width:220px}
.header-right{text-align:right}
.report-title{font-size:13px;font-weight:600;color:var(--grey);letter-spacing:.02em;text-transform:uppercase}
.report-ref{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}

/* Outcome banner */
.outcome-banner{padding:14px 24px;display:flex;align-items:center;gap:12px;font-weight:600;font-size:15px;border-bottom:1px solid var(--border)}
.outcome-banner.repaired{background:#dcfce7;color:var(--green)}
.outcome-banner.waiting{background:var(--amber-bg);color:var(--amber)}
.outcome-banner.unrepairable{background:var(--red-bg);color:var(--red)}
.outcome-banner.referred{background:var(--purple-bg);color:var(--purple)}
.outcome-banner.pending{background:var(--blue-light);color:var(--blue)}
.outcome-icon{font-size:20px;flex-shrink:0}
.outcome-text .sub{font-size:12px;font-weight:400;opacity:.75;margin-top:1px}

/* Page */
.page{max-width:760px;margin:0 auto;padding:24px 20px 60px}

/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px}
.card-title{font-size:11px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}

/* Info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(min-width:520px){.info-grid{grid-template-columns:repeat(3,1fr)}}
.info-item .lbl{font-size:11px;color:var(--muted);margin-bottom:4px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}
.info-item .val{font-size:14px;color:var(--dark);font-weight:500;line-height:1.4}
.info-item.full{grid-column:1/-1}

/* Outcome pill */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;padding:4px 10px;border-radius:20px}
.pill.repaired{background:var(--green-bg);color:var(--green)}
.pill.waiting{background:var(--amber-bg);color:var(--amber)}
.pill.unrepairable{background:var(--red-bg);color:var(--red)}
.pill.referred{background:var(--purple-bg);color:var(--purple)}

/* Media */
.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(min-width:480px){.media-grid{grid-template-columns:repeat(4,1fr)}}
.media-thumb{aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--bg);cursor:pointer;position:relative;border:1px solid var(--border)}
.media-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .2s;display:block}
.media-thumb:hover img{transform:scale(1.04)}
.media-thumb video{width:100%;height:100%;object-fit:cover;display:block}
.video-badge{position:absolute;bottom:5px;left:5px;background:rgba(0,0,0,.65);border-radius:3px;font-size:10px;padding:2px 6px;color:#fff;font-family:var(--mono)}
.play-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.no-media{padding:20px;text-align:center;color:var(--muted);font-size:13px;font-style:italic;background:var(--bg);border-radius:6px}

/* Parts table */
.parts-table{width:100%;border-collapse:collapse;font-size:14px}
.parts-table th{text-align:left;font-size:11px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:0 8px 10px;font-weight:400;border-bottom:1px solid var(--border)}
.parts-table td{padding:10px 8px;border-bottom:1px solid var(--border);color:var(--dark)}
.parts-table tr:last-child td{border-bottom:none}
.sku{font-family:var(--mono);font-size:11px;color:var(--muted);display:block;margin-top:2px}
.qty-badge{display:inline-block;background:var(--blue-light);color:var(--blue);font-family:var(--mono);font-size:12px;font-weight:600;padding:2px 8px;border-radius:4px}

/* Notes */
.notes-text{font-size:14px;color:var(--grey);line-height:1.7;white-space:pre-wrap}

/* PDF button */
.print-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .15s;margin-bottom:14px}
.print-btn:hover{background:#1e96cc}
.print-btn svg{flex-shrink:0}

/* Footer */
.footer{background:var(--white);border-top:1px solid var(--border);padding:24px;text-align:center;margin-top:8px}
.footer-logo{height:36px;width:auto;margin:0 auto 12px;display:block;max-width:160px}
.footer-contact{font-size:13px;color:var(--muted);margin-bottom:4px}
.footer-contact a{color:var(--blue);text-decoration:none}
.footer-contact a:hover{text-decoration:underline}
.footer-legal{font-size:11px;color:#aaa;margin-top:8px}

/* Loader / Error */
.loader{display:flex;align-items:center;justify-content:center;gap:12px;padding:80px 20px;color:var(--muted);font-size:13px}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox img,.lightbox video{max-width:100%;max-height:90vh;border-radius:8px;object-fit:contain}
.lb-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:22px;width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lb-close:hover{background:rgba(255,255,255,.22)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:none;color:#fff;font-size:20px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lb-nav:hover{background:rgba(255,255,255,.22)}
.lb-prev{left:14px}
.lb-next{right:14px}

/* Print styles */
@media print {
  body{background:white}
  .print-btn,.lightbox,.lb-close,.lb-nav{display:none!important}
  .card{border:1px solid #ddd;box-shadow:none;break-inside:avoid}
  .media-thumb{break-inside:avoid}
  .header{border-bottom:1px solid #ddd}
  .outcome-banner{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pill{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .footer{border-top:1px solid #ddd}
}
</style>
</head>
<body>

<div id="reportHeader" style="display:none">
  <div class="header">
    <img src="assets/logo.png" class="logo" alt="eTech Mobility">
    <div class="header-right">
      <div class="report-title">Repair Report</div>
      <div class="report-ref" id="headerRef"></div>
    </div>
  </div>
  <div class="outcome-banner" id="outcomeBanner"></div>
</div>

<div class="page">
  <div id="pageContent"><div class="loader"><div class="spinner"></div>Loading report…</div></div>
</div>

<div id="reportFooter" style="display:none">
  <div class="footer">
    <img src="assets/logo.png" class="footer-logo" alt="eTech Mobility">
    <div class="footer-contact">Questions? Contact us at <a href="mailto:support@etechmobility.co.uk">support@etechmobility.co.uk</a></div>
    <div class="footer-legal">This report was generated by eTech Mobility · <span id="footerDate"></span></div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">×</button>
  <button class="lb-nav lb-prev" id="lbPrev" onclick="lbNav(-1)">‹</button>
  <div id="lightboxContent"></div>
  <button class="lb-nav lb-next" id="lbNext" onclick="lbNav(1)">›</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://xndqyqdqturqqnltvqvd.supabase.co'
const SUPABASE_KEY = 'sb_publishable_JFdevwgCqf3plTIcmxGJ_A_h6sLuodl'
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
const ORDER_ID = new URLSearchParams(location.search).get('id')

let lbItems = [], lbIndex = 0

;(async () => {
  if (!ORDER_ID) { showError('Invalid report link.'); return }

  const [orderRes, repairRes, mediaRes] = await Promise.all([
    sb.from('orders').select('*').eq('id', ORDER_ID).single(),
    sb.from('repairs').select('*, repair_parts(quantity_used, parts(name,sku))').eq('order_id', ORDER_ID).order('submitted_at', {ascending:false}).limit(1).maybeSingle(),
    sb.from('media').select('*').eq('order_id', ORDER_ID).order('created_at')
  ])

  if (orderRes.error || !orderRes.data) { showError('Report not found. This link may have expired or be incorrect.'); return }

  const order  = orderRes.data
  const repair = repairRes.data
  const media  = mediaRes.data || []
  const intake     = media.filter(m => m.stage === 'intake')
  const completion = media.filter(m => m.stage === 'completion')

  document.title = `Repair Report — ${order.customer_name||'eTech Mobility'}`
  document.getElementById('headerRef').textContent = `JOB #${ORDER_ID.slice(-8).toUpperCase()}${order.zendesk_ticket_id ? ' · ZD #'+order.zendesk_ticket_id : ''}`
  document.getElementById('footerDate').textContent = `Generated ${fmtDate(new Date().toISOString())}`
  document.getElementById('reportHeader').style.display = 'block'
  document.getElementById('reportFooter').style.display = 'block'

  // Outcome banner
  const ob = document.getElementById('outcomeBanner')
  if (repair?.outcome) {
    const { cls, icon, label, sub } = outcomeInfo(repair.outcome)
    ob.className = `outcome-banner ${cls}`
    ob.innerHTML = `<span class="outcome-icon">${icon}</span><div class="outcome-text"><div>${label}</div><div class="sub">${sub}</div></div>`
  } else {
    ob.className = 'outcome-banner pending'
    ob.innerHTML = `<span class="outcome-icon">🔧</span><div class="outcome-text"><div>Repair In Progress</div></div>`
  }

  // Collect all photo items for lightbox
  const allPhotos = [...intake, ...completion].filter(m => m.media_type === 'photo')
  lbItems = allPhotos.map(m => storageUrl(m.storage_path))

  document.getElementById('pageContent').innerHTML = `

    <div class="card">
      <div class="card-title">Job Details</div>
      <div class="info-grid">
        <div class="info-item">
          <div class="lbl">Customer</div>
          <div class="val">${esc(order.customer_name||'—')}</div>
        </div>
        <div class="info-item">
          <div class="lbl">Chair Model</div>
          <div class="val">${esc(order.chair_model)}</div>
        </div>
        <div class="info-item">
          <div class="lbl">Date Received</div>
          <div class="val">${fmtDate(order.created_at)}</div>
        </div>
        <div class="info-item full">
          <div class="lbl">Fault Reported</div>
          <div class="val">${esc(order.fault_reported||'—')}</div>
        </div>
      </div>
    </div>

    ${repair ? `
    <div class="card">
      <div class="card-title">Repair Summary</div>
      <div class="info-grid">
        <div class="info-item">
          <div class="lbl">Technician</div>
          <div class="val">${esc(repair.technician_name||'—')}</div>
        </div>
        <div class="info-item">
          <div class="lbl">Time Taken</div>
          <div class="val">${fmtTime(repair.time_taken_minutes)}</div>
        </div>
        <div class="info-item">
          <div class="lbl">Outcome</div>
          <div class="val"><span class="pill ${outcomeInfo(repair.outcome||'').cls}">${esc(repair.outcome||'—')}</span></div>
        </div>
        <div class="info-item">
          <div class="lbl">Completed</div>
          <div class="val">${fmtDate(repair.submitted_at)}</div>
        </div>
      </div>
    </div>` : ''}

    ${repair?.repair_parts?.length ? `
    <div class="card">
      <div class="card-title">Parts Used</div>
      <table class="parts-table">
        <thead><tr><th>Part</th><th>Qty</th></tr></thead>
        <tbody>
          ${repair.repair_parts.map(rp => `
          <tr>
            <td>${esc(rp.parts?.name||'Unknown')}<span class="sku">${esc(rp.parts?.sku||'')}</span></td>
            <td><span class="qty-badge">×${rp.quantity_used}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}

    ${repair?.notes ? `
    <div class="card">
      <div class="card-title">Technician Notes</div>
      <div class="notes-text">${esc(repair.notes)}</div>
    </div>` : ''}

    ${intake.length ? `
    <div class="card">
      <div class="card-title">Arrival Photos &amp; Video</div>
      <div class="media-grid">${intake.map(m => thumbHTML(m, lbItems)).join('')}</div>
    </div>` : ''}

    ${completion.length ? `
    <div class="card">
      <div class="card-title">Completion Photos &amp; Video</div>
      <div class="media-grid">${completion.map(m => thumbHTML(m, lbItems)).join('')}</div>
    </div>` : ''}

    <button class="print-btn" onclick="window.print()">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>
      Download / Print Report
    </button>
  `
})()

function storageUrl(path) {
  return `${SUPABASE_URL}/storage/v1/object/public/repairs/${path}`
}

function thumbHTML(m, photoList) {
  const url = storageUrl(m.storage_path)
  if (m.media_type === 'video') {
    return `<div class="media-thumb" onclick="openVideo('${url}')">
      <video src="${url}" muted preload="metadata"></video>
      <div class="play-icon">▶</div>
      <div class="video-badge">VIDEO</div>
    </div>`
  }
  const idx = photoList.indexOf(url)
  return `<div class="media-thumb" onclick="openPhoto(${idx})">
    <img src="${url}" alt="repair photo" loading="lazy">
  </div>`
}

function openPhoto(idx) {
  lbIndex = idx
  const url = lbItems[idx]
  document.getElementById('lightboxContent').innerHTML = `<img src="${url}" alt="repair photo">`
  document.getElementById('lbPrev').style.display = lbItems.length > 1 ? 'flex' : 'none'
  document.getElementById('lbNext').style.display = lbItems.length > 1 ? 'flex' : 'none'
  document.getElementById('lightbox').classList.add('open')
}

function openVideo(url) {
  document.getElementById('lbPrev').style.display = 'none'
  document.getElementById('lbNext').style.display = 'none'
  document.getElementById('lightboxContent').innerHTML = `<video src="${url}" controls autoplay style="max-width:100%;max-height:85vh;border-radius:8px"></video>`
  document.getElementById('lightbox').classList.add('open')
}

function lbNav(dir) {
  lbIndex = (lbIndex + dir + lbItems.length) % lbItems.length
  openPhoto(lbIndex)
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open')
  document.getElementById('lightboxContent').innerHTML = ''
}

function outcomeInfo(o) {
  const map = {
    'Repaired':          { cls:'repaired',      icon:'✅', label:'Repair Complete',       sub:'Your powerchair has been successfully repaired' },
    'Waiting for Parts': { cls:'waiting',        icon:'⏳', label:'Awaiting Parts',         sub:'We will be in touch once parts arrive' },
    'Unrepairable':      { cls:'unrepairable',   icon:'⚠️', label:'Unable to Repair',       sub:'Please contact us to discuss next steps' },
    'Referred':          { cls:'referred',       icon:'↗️', label:'Referred',               sub:'Your repair has been referred for further assessment' },
  }
  return map[o] || { cls:'pending', icon:'🔧', label: o || 'In Progress', sub:'' }
}

function showError(msg) {
  document.getElementById('pageContent').innerHTML = `
    <div style="text-align:center;padding:80px 20px">
      <div style="font-size:36px;margin-bottom:16px">🔍</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px;color:var(--dark)">${msg}</div>
      <div style="font-size:13px;color:var(--muted)">If you believe this is an error, please contact <a href="mailto:support@etechmobility.co.uk" style="color:var(--blue)">support@etechmobility.co.uk</a></div>
    </div>`
}

function fmtDate(d) { return new Date(d).toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'}) }
function fmtTime(mins) {
  if (!mins) return '—'
  if (mins < 60) return `${mins} min`
  const h = Math.floor(mins/60), m = mins%60
  return m ? `${h}h ${m}m` : `${h} hour${h>1?'s':''}`
}
function capitalize(s) { return s ? s.charAt(0).toUpperCase()+s.slice(1) : '' }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return
  if (e.key === 'Escape') closeLightbox()
  if (e.key === 'ArrowRight') lbNav(1)
  if (e.key === 'ArrowLeft') lbNav(-1)
})
</script>
</body>
</html>
